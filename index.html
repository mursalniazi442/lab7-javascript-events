<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lab 7: JavaScript Events</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <h1>Lab 7: JavaScript Events</h1>



  <section>

    <h2>Mouse Events</h2>

    <button id="hoverButton">Hover over me</button>

    <p id="mouseMessage">Move your mouse over the button.</p>

  </section>



  <section>

    <h2>Keyboard Events</h2>

    <input type="text" id="keyboardInput" placeholder="Type something here" />

    <p id="keyboardMessage">Last key pressed: none</p>

  </section>



  <section>

    <h2>Form Events</h2>

    <form id="myForm">

      <input type="text" id="nameInput" placeholder="Enter your name" required />

      <button type="submit">Submit</button>

    </form>

    <p id="formMessage"></p>

  </section>



  <section>

    <h2>Focus and Blur Events</h2>

    <input type="text" id="focusInput" placeholder="Click here then click away" />

    <p id="focusMessage">Input is not selected.</p>

  </section>



  <section>

    <h2>Event Delegation</h2>

    <div id="buttonContainer">

      <button>Button 1</button>

      <button>Button 2</button>

      <button>Button 3</button>

    </div>

    <p id="delegateMessage">Click one of the buttons above.</p>

  </section>



  <script src="script.js"></script>

</body>

</html>
